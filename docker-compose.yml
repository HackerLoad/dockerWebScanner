services:
  scanner:
    build: .
    # Host networking is required so nmap can see the physical LAN.
    # On macOS with Docker Desktop this is limited by the VM layer;
    # set SUBNET manually if auto-detection picks a wrong range.
    network_mode: host

    volumes:
      # Docker socket – needed to read container/port info
      - /var/run/docker.sock:/var/run/docker.sock

    cap_add:
      # Required for raw-socket operations used by nmap
      - NET_ADMIN
      - NET_RAW

    restart: unless-stopped

    environment:
      # Override subnet if auto-detection is wrong, e.g. "192.168.1.0/24"
      - SUBNET=${SUBNET:-}
