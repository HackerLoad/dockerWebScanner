services:
  scanner:
    build: .
    ports:
      - "5001:5000"

    volumes:
      # Docker socket – needed to read container/port info
      - /var/run/docker.sock:/var/run/docker.sock

    cap_add:
      # Required for raw-socket operations used by nmap
      - NET_ADMIN
      - NET_RAW

    restart: unless-stopped

    environment:
      # On macOS set this to your LAN subnet, e.g. "192.168.1.0/24"
      - SUBNET=${SUBNET:-}
